<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Water Cycle Simulation</title>

<style>

body{
margin:0;
background:linear-gradient(#87CEEB,#cdefff);
font-family:Arial;
text-align:center;
overflow:hidden;
}

#scene{
position:relative;
height:500px;
}

.sun{
position:absolute;
top:50px;
left:80px;
width:80px;
height:80px;
background:gold;
border-radius:50%;
box-shadow:0 0 40px yellow;
cursor:pointer;
transition:left 2s;
}

.cloud{
position:absolute;
width:160px;
height:60px;
background:white;
border-radius:50px;
animation:cloudMove linear infinite;
}

.cloud:nth-child(1){top:120px;animation-duration:20s;}
.cloud:nth-child(2){top:80px;animation-duration:25s;}
.cloud:nth-child(3){top:160px;animation-duration:18s;}
.cloud:nth-child(4){top:200px;animation-duration:30s;}

@keyframes cloudMove{
0%{left:-200px}
100%{left:100%}
}

.ocean{
position:absolute;
bottom:0;
width:100%;
height:120px;
background:#1e90ff;
}

.drop{
position:absolute;
width:6px;
height:12px;
background:blue;
border-radius:50%;
animation:rain 1s linear infinite;
}

@keyframes rain{
0%{transform:translateY(0)}
100%{transform:translateY(300px)}
}

/* Kids images */

.kidimg{
position:absolute;
bottom:120px;
width:120px;
}

.kid1{left:25%;}
.kid2{left:45%;}
.kid3{left:65%;}

</style>
</head>

<body>

<h2>Interactive Water Cycle</h2>

<button onclick="startRain()">Rain</button>

<div id="scene">

<div class="sun" id="sun"></div>

<div class="cloud"></div>
<div class="cloud"></div>
<div class="cloud"></div>
<div class="cloud"></div>

<!-- Kid Images -->

<img class="kidimg kid1"
src="https://static.vecteezy.com/system/resources/thumbnails/075/059/254/small/cartoon-illustration-of-children-playing-in-the-rain-vector.jpg">

<img class="kidimg kid2"
src="https://media.istockphoto.com/id/1180714131/vector/happy-cute-kid-girl-play-wear-raincoat.jpg?s=612x612&w=0&k=20&c=6mODwVJPZ-IHgLnbufC0JhXnL6Ke-WKfshfZRYgJGqA=">

<img class="kidimg kid3"
src="https://previews.123rf.com/images/elinorka/elinorka1506/elinorka150600017/40865738-children-with-umbrellas-walking-in-the-rain-vector-illustration.jpg">

<div class="ocean"></div>

</div>

<script>

const sun=document.getElementById("sun")
const scene=document.getElementById("scene")

// Move Sun
sun.addEventListener("click",function(){
let newPos=Math.random()*window.innerWidth
sun.style.left=newPos+"px"
})

// Rain
function startRain(){

for(let i=0;i<60;i++){

let drop=document.createElement("div")
drop.className="drop"

let randomX=Math.random()*window.innerWidth

drop.style.left=randomX+"px"
drop.style.top="150px"

drop.style.animationDelay=Math.random()+"s"

scene.appendChild(drop)

}

}

</script>

</body>
</html>
